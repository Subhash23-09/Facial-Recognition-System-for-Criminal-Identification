<!DOCTYPE html>
<html>
<head>
  <title>Add Criminal</title>
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background-color: #f5f5f5;
      padding: 2rem;
    }

    .form-box {
      max-width: 600px;
      background: white;
      padding: 2rem;
      border-radius: 10px;
      margin: auto;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 2rem;
    }

    input[type="text"],
    textarea,
    input[type="file"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 1rem;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

  <div class="form-box">
    <h2>Add Criminal Entry</h2>
    <form method="POST" enctype="multipart/form-data">
      <input type="text" name="name" placeholder="Criminal Name" required />
      <textarea name="description" rows="4" placeholder="Description (optional)"></textarea>
      <input type="file" name="image" accept="image/*" required />
      <button type="submit">Add Criminal</button>
    </form>
  </div>

</body>
</html>
